<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Fiorista</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="test.css">
</head>

<body>
    <header class="header">

        <div class="logo">
            <img class="logo-i"
                src="https://i.etsystatic.com/56071550/r/il/ab617b/6791424182/il_1588xN.6791424182_pl4i.jpg" alt="">

            <span class="logo-text">Petaloso</span>
        </div>
        <nav>
            <div class="navbar">
                <ul class="menu">
                    <li>
                        <a href="*">Home</a>
                    </li>
                    <li>
                        <a href="*">Chi siamo</a>
                    </li>
                    <li>
                        <a href="*">Servizi</a>
                    </li>
                    <li>
                        <a href="*">Dove siamo</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <div class="presentazione">
            <div class="img-pres">
                <img src="https://www.interflora.it/fstrz/r/s/www.datocms-assets.com/70715/1773938599-spring-hero-banner-octopus_02.jpg?w=1150&h=450&crop=focalpoint&fit=crop&frz-v=1381"
                    alt="">
            </div>
            <div class="img-sott">
                <h1>Fiori per tutti</h1>
                <p> Scopri la bellezza romantica di un fiore</p>
            </div>
        </div>
        <div class="card">
            <h1> I nostri prodotti</h1>
            <div class="slide-prodotti">
                <div class="item">
                    <img src="https://www.interflora.it/fstrz/r/s/www.datocms-assets.com/70715/1764243761-ff021-m-musa-key.jpg?w=542"
                        alt="Item1">
                </div>
                <div class="item">
                    <img src="https://www.interflora.it/fstrz/r/s/www.datocms-assets.com/70715/1769762754-rf001-m-cancion-de-amor-key.jpg?w=542"
                        alt="">
                </div>
                <div class="item">
                    <img src="https://www.interflora.it/fstrz/r/s/www.datocms-assets.com/70715/1756806487-ff156-key.jpg?w=542"
                        alt="">
                </div>
                <div class="item">
                    <img src="https://www.interflora.it/fstrz/r/s/www.datocms-assets.com/70715/1773652650-ff038-m-legame-fiorito-zoom-key_v3.jpg?w=400"
                        alt="">
                </div>
                <div class="item">
                    <img src="https://www.interflora.it/fstrz/r/s/www.datocms-assets.com/70715/1758036737-ff013-m.jpg?w=400"
                        alt="">
                </div>
            </div>
        </div>

        <div class="contatti card">
            <h1>Contattaci</h1>
            <div class="form">
                <form action="*">
                    <input type="text" name="nome" id="nome" placeholder="Nome" required>
                    <input type="text" name="email" id="email" placeholder="Email" required>
                    <textarea name="text" id="text" placeholder="Scrivi il tuo messaggio..." required></textarea>
                    <button type="submit">Invia</button>
                </form>
            </div>
        </div>
    </main>
    <footer></footer>
</body>

</html>
