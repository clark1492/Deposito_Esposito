<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esercizio DOM</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1 id="titolo">Lista Dinamica</h1>

        <div id="box">
            Questo è un div con del testo.
        </div>

        <input type="text" id="inputTesto" placeholder="Scrivi qualcosa">

        <div class="bottoni">
            <button id="aggiungiBtn">Aggiungi elemento</button>
            <button id="rimuoviBtn">Rimuovi ultimo</button>
            <button id="titleBtn">Cambia colore</button>
            <button id="sfondoBtn">Cambia sfondo</button>
            <button id="nascondiBtn">Nascondi div</button>
            <button id="resetBtn">Reset</button>
        </div>

        <p id="contatore">Elementi presenti: 0</p>

        <ul id="lista"></ul>

    </div>

    <script src="script.js"></script>
</body>

</html>
