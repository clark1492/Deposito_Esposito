<!DOCTYPE html>
<html lang="it">

<head>
    <!-- codifica -->
    <meta charset="UTF-8">
    <!-- descrizione pagina -->
    <meta name="description" content="Esempio di pagina HTML">
    <!-- autore della pagina -->
    <meta name="author" content="Nome Autore">
    <!-- inizializza la scala e la larghezza responsiva per dispositivi mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina con meta tag</title>
</head>

<body>

    <header>
        <h1>Sito di esempio</h1>
    </header>
    <!-- la navbar -->
    <nav>
        <a href="#">Home</a>
        <a href="#">Contatti</a>
    </nav>

    <main>
        <section>
            <h2>Sezione principale</h2>
            <p>Contenuto della sezione.</p>
        </section>

        <article>
            <h2>Articolo</h2>
            <p>Testo di un contenuto indipendente.</p>
        </article>

        <table border="1">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Età</th>
                    <th>Ruolo</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Mario</td>
                    <td>25</td>
                    <td>Studente</td>
                </tr>
                <tr>
                    <td>Laura</td>
                    <td>30</td>
                    <td>Docente</td>
                </tr>
            </tbody>
        </table>
    </main>

    <footer>
        <p>Copyright 2026</p>
    </footer>

</body>

</html>
