<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout CSS Grid e Flexbox</title>
    <link rel="stylesheet" href="es5.css">
</head>

<body>

    <!-- Contenitore principale -->
    <div class="container">

        <!-- Header -->
        <header>
            Il mio sito web
        </header>

        <!-- Sidebar -->
        <aside>
            <h2>Menu</h2>

            <ul>
                <li>Home</li>
                <li>Servizi</li>
                <li>Contatti</li>
            </ul>
        </aside>

        <!-- Contenuto principale -->
        <main>

            <!-- Elemento con position absolute -->
            <div class="badge">
                NEW
            </div>

            <h2>Contenuto principale</h2>

            <p>
                Questa sezione utilizza CSS Grid per il layout generale,
                Flexbox per gli allineamenti e position absolute
                per posizionare il badge rosso.
            </p>

            <button>
                Clicca qui
            </button>

        </main>

        <!-- Footer -->
        <footer>
            Footer del sito
        </footer>

    </div>

</body>
</html>
